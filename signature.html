<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Signature Pad</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.4/dist/signature_pad.umd.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 10px;
    font-family: Arial, sans-serif;
    background: #fff;
}

#wrapper {
    width: 100%;
}

#signature-pad {
    width: 100%;
    height: 220px;
    border: 2px solid #ccc;
    border-radius: 6px;
    touch-action: none;
    background: white;
}
</style>
</head>

<body>

<div id="wrapper">
    <canvas id="signature-pad"></canvas>
</div>

<script>

const canvas = document.getElementById("signature-pad");

function resizeCanvas() {

    const ratio = Math.max(window.devicePixelRatio || 1, 1);

    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = 220 * ratio;

    canvas.getContext("2d").scale(ratio, ratio);
}

resizeCanvas();

const signaturePad = new SignaturePad(canvas, {
    minWidth: 1,
    maxWidth: 2.5
});

let uploadTimer = null;
let lastSignature = "";

async function uploadSignature() {

    if (signaturePad.isEmpty()) {
        return;
    }

    const dataURL = signaturePad.toDataURL("image/png");

    // Don't upload again if nothing changed
    if (dataURL === lastSignature) {
        return;
    }

    lastSignature = dataURL;

    try {

        // Convert DataURL to Blob
        const blob = await (await fetch(dataURL)).blob();

        const formData = new FormData();
        formData.append("file", blob);
        formData.append("upload_preset", "proof_of_delivery");

        const response = await fetch(
            "https://api.cloudinary.com/v1_1/ghkcuamj/image/upload",
            {
                method: "POST",
                body: formData
            }
        );

        const result = await response.json();

        console.log("Cloudinary Response:", result);

        if (!result.secure_url) {
            console.error("Upload failed:", result);
            return;
        }

        console.log("Image URL:", result.secure_url);

        // Send URL back to FormCrafts
        window.parent.postMessage({
            type: "signature",
            value: <img src="' + imageUrl + '" width="250">
        }, "*");

    }
    catch (err) {

        console.error("Upload Error:", err);

    }

}

// Upload 1 second after the user finishes writing
signaturePad.addEventListener("endStroke", function () {

    clearTimeout(uploadTimer);

    uploadTimer = setTimeout(function () {

        uploadSignature();

    }, 1000);

});

window.addEventListener("resize", resizeCanvas);

</script>

</body>
</html>
